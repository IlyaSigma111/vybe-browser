<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vybe Browser</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══════════════════════════════════════ -->
<!--  TITLEBAR                              -->
<!-- ═══════════════════════════════════════ -->
<div class="titlebar" id="titlebar">
  <div class="titlebar-title">⚡ vybe</div>
  <div class="titlebar-buttons">
    <button id="btn-min" title="Minimize">─</button>
    <button id="btn-max" title="Maximize">□</button>
    <button id="btn-close" title="Close">✕</button>
  </div>
</div>

<!-- ═══════════════════════════════════════ -->
<!--  NAVBAR                                 -->
<!-- ═══════════════════════════════════════ -->
<div class="navbar" id="navbar">
  <button class="nav-btn" id="btn-back" title="Back (← / Alt+Left)" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
  </button>
  <button class="nav-btn" id="btn-forward" title="Forward (→ / Alt+Right)" disabled>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
  </button>
  <button class="nav-btn" id="btn-reload" title="Reload (F5 / Ctrl+R)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 11-1.44-9.14L23 10"/></svg>
  </button>
  <button class="nav-btn" id="btn-home" title="Home (Alt+Home)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </button>

  <div class="url-bar-wrapper">
    <span class="ssl-icon" id="ssl-icon" title="Connection security">🔒</span>
    <input type="text" class="url-bar" id="url-bar" placeholder="Enter URL or search..." spellcheck="false" autocomplete="off">
  </div>

  <button class="nav-btn" id="btn-bookmark-toggle" title="Bookmark (Alt+B)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
  </button>
  <button class="nav-btn" id="btn-zoom" title="Zoom (Ctrl+Plus/Minus)">
    <span id="zoom-label">100%</span>
  </button>

  <div class="nav-dropdown-wrapper">
    <button class="nav-btn" id="btn-menu" title="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
    </button>
    <div class="dropdown-menu" id="main-menu">
      <div class="dropdown-item" data-action="history">🕐 History</div>
      <div class="dropdown-item" data-action="bookmarks">⭐ Bookmarks</div>
      <div class="dropdown-item" data-action="downloads">📥 Downloads</div>
      <div class="dropdown-item" data-action="extensions">🧩 Extensions</div>
      <div class="dropdown-item" data-action="cookies">🍪 Cookies</div>
      <div class="dropdown-item" data-action="settings">⚙ Settings</div>
      <div class="dropdown-sep"></div>
      <div class="dropdown-item" data-action="print">🖨 Print (Ctrl+P)</div>
      <div class="dropdown-item" data-action="pdf">📄 Save as PDF</div>
      <div class="dropdown-item" data-action="save-page">💾 Save page</div>
      <div class="dropdown-item" data-action="view-source">📝 View source</div>
      <div class="dropdown-item" data-action="devtools">🔧 DevTools (F12)</div>
      <div class="dropdown-sep"></div>
      <div class="dropdown-item" data-action="find">🔍 Find in page (Ctrl+F)</div>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════ -->
<!--  BOOKMARKS BAR                          -->
<!-- ═══════════════════════════════════════ -->
<div class="bookmarks-bar" id="bookmarks-bar"></div>

<!-- ═══════════════════════════════════════ -->
<!--  FIND BAR                               -->
<!-- ═══════════════════════════════════════ -->
<div class="find-bar hidden" id="find-bar">
  <input type="text" class="find-input" id="find-input" placeholder="Find in page..." spellcheck="false">
  <span class="find-count" id="find-count"></span>
  <button class="find-btn" id="find-prev" title="Previous">▲</button>
  <button class="find-btn" id="find-next" title="Next">▼</button>
  <button class="find-btn" id="find-close">✕</button>
</div>

<!-- ═══════════════════════════════════════ -->
<!--  PANELS                                  -->
<!-- ═══════════════════════════════════════ -->
<div class="panel-overlay hidden" id="panel-overlay"></div>

<div class="panel hidden" id="panel">
  <div class="panel-header">
    <h2 id="panel-title">Panel</h2>
    <button class="panel-close" id="panel-close">✕</button>
  </div>
  <div class="panel-body" id="panel-body"></div>
</div>

<!-- ═══════════════════════════════════════ -->
<!--  STATUS BAR                             -->
<!-- ═══════════════════════════════════════ -->
<div class="statusbar" id="statusbar">
  <span id="status-left">Ready</span>
  <span id="status-right">
    <span id="status-zoom">100%</span>
    <span class="status-sep">│</span>
    <span id="status-theme" title="Cycle theme (Alt+T)">dark</span>
    <span class="status-sep">│</span>
    <span id="status-cmd" title="Command palette (Ctrl+Space)">⌨</span>
  </span>
</div>

<!-- ═══════════════════════════════════════ -->
<!--  COMMAND PALETTE                         -->
<!-- ═══════════════════════════════════════ -->
<div class="cmd-overlay hidden" id="cmd-overlay"></div>
<div class="cmd-palette hidden" id="cmd-palette">
  <input type="text" class="cmd-input" id="cmd-input" placeholder="Type a command..." spellcheck="false" autocomplete="off">
  <div class="cmd-list" id="cmd-list"></div>
</div>

<script src="themes.js"></script>
<script src="renderer.js"></script>
</body>
</html>
